<div id="topic-card-{{ topic.id }}" class="rounded-lg border border-brand-200 bg-brand-50/40 px-3 py-2.5">
  <div class="text-sm font-medium text-slate-700">{{ topic.title }}</div>
  <div class="text-xs text-slate-400 mt-1">{{ campaign_name }}</div>
  <div class="text-xs text-slate-500 mt-2 line-clamp-3">{{ topic.outline }}</div>

  <div hx-get="/writing/articles/{{ article.id }}/generate-status"
       hx-trigger="load, every 2s"
       hx-swap="innerHTML"
       class="mt-3 rounded-lg border border-slate-200 bg-white px-3 py-2">
    <div class="flex items-center gap-2 text-sm text-slate-500">
      <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
      准备中…
    </div>
  </div>
</div>
