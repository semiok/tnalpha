<div class="fixed inset-0 z-40 bg-black/30 grid place-items-center" onclick="if(event.target===this)tnCloseModal()">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden m-4">
    <form method="post" action="/schedule/slots/{{ slot.id }}/publish" class="p-5">
      <input type="hidden" name="return_to" value="{{ return_to }}">
      <div class="flex items-start justify-between gap-3 mb-4">
        <div class="min-w-0">
          <div class="font-semibold text-slate-800">发布</div>
          <div class="text-xs text-slate-400 mt-1 truncate">{{ article.title if article else "文章 #" ~ slot.article_id }}</div>
          {% if recommended_platform %}<div class="text-xs text-slate-400 mt-1">推荐平台：{{ recommended_platform }}</div>{% endif %}
        </div>
        <button type="button" onclick="tnCloseModal()" class="text-slate-400 hover:text-slate-600">✕</button>
      </div>

      <div class="space-y-3">
        <label class="block text-xs text-slate-500">发布平台
          <select name="platform" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700">
            {% set selected_platform = slot.platform or recommended_platform or "小红书" %}
            {% for p in ["小红书", "微信公众号"] %}
              <option value="{{ p }}" {{ "selected" if selected_platform == p else "" }}>{{ p }}</option>
            {% endfor %}
          </select>
        </label>
        <label class="block text-xs text-slate-500">发布时间
          <input type="datetime-local" name="published_at" value="{{ default_published_at }}" class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
        </label>
        <label class="block text-xs text-slate-500">发布链接
          <input type="url" name="published_url" value="{{ slot.published_url }}" placeholder="https://..." class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
        </label>
      </div>

      <div class="flex justify-end gap-2 mt-5">
        <button type="button" onclick="tnCloseModal()" class="px-3.5 py-2 rounded-lg text-sm bg-slate-100 text-slate-600 hover:bg-slate-200">取消</button>
        <button class="px-3.5 py-2 rounded-lg text-sm font-medium bg-emerald-600 text-white hover:bg-emerald-700">确认发布</button>
      </div>
    </form>
  </div>
</div>
